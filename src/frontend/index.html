<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineSearch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['DM Serif Display', 'serif'],
              body: ['DM Sans', 'sans-serif'],
            },
            colors: {
              ink: '#0d0d0f',
              paper: '#111114',
              panel: '#18181c',
              border: '#2a2a30',
              muted: '#6b6b78',
              light: '#e8e8ee',
              accent: '#e8c56d',
            },
            animation: {
              'fade-up': 'fadeUp 0.5s ease both',
            },
            keyframes: {
              fadeUp: {
                from: { opacity: 0, transform: 'translateY(12px)' },
                to:   { opacity: 1, transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; }
      h1, h2, h3 { font-family: 'DM Serif Display', serif; }

      /* Subtle film grain overlay */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0d0d0f; }
      ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 2px; }

      /* Loading shimmer */
      @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
      .shimmer::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
        animation: shimmer 1.8s infinite;
      }

      /* Loading bar */
      @keyframes sweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(200vw); }
      }
      .loading-sweep {
        animation: sweep 1.4s ease-in-out infinite;
        background: linear-gradient(90deg, transparent, #e8c56d, transparent);
      }

      /* Card hover */
      .movie-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .movie-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      }

      /* Input focus glow */
      .search-input:focus {
        outline: none;
        border-color: #e8c56d;
        box-shadow: 0 0 0 3px rgba(232, 197, 109, 0.08);
      }

      /* Radio custom */
      input[type="radio"] { accent-color: #e8c56d; }
      select { background-image: none; }
    </style>
  </head>

  <body class="min-h-screen bg-ink text-light relative z-10">

    <!-- Loading bar -->
    <div id="loadingBar" class="hidden fixed top-0 left-0 right-0 z-50 h-[2px] bg-panel overflow-hidden">
      <div class="loading-sweep h-full w-32 absolute top-0 left-0"></div>
    </div>

    <!-- Movie Modal -->
    <div id="movieModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
      <div class="bg-panel border border-border rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
        <div class="p-6 sm:p-8">
          <div class="flex justify-between items-start mb-6 gap-4">
            <h2 id="modalTitle" class="text-2xl sm:text-3xl leading-tight"></h2>
            <button id="closeModal" class="text-muted hover:text-light transition-colors text-3xl leading-none shrink-0">×</button>
          </div>
          <div id="modalContent"></div>
        </div>
      </div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col">

      <!-- Header -->
      <header class="border-b border-border">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 flex items-center gap-3">
          <span class="text-2xl">🎬</span>
          <div>
            <h1 class="text-2xl sm:text-3xl leading-none text-light">CineSearch</h1>
            <p class="text-muted text-xs mt-0.5 font-body font-light tracking-wide">Movie Discovery</p>
          </div>
        </div>
      </header>

      <!-- Main -->
      <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 py-8 sm:py-12 space-y-8">

        <!-- Search Card -->
        <section class="bg-panel border border-border rounded-2xl p-5 sm:p-7 space-y-6 animate-fade-up">

          <!-- Provider toggle -->
          <div>
            <p class="text-xs font-body font-medium text-muted uppercase tracking-widest mb-3">Source</p>
            <div class="flex flex-wrap gap-x-6 gap-y-2">
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="radio" name="provider" value="yts" checked class="mt-px">
                <span class="text-sm group-hover:text-light transition-colors">YTS — Movies</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer group">
                <input type="radio" name="provider" value="tpb" class="mt-px">
                <span class="text-sm group-hover:text-light transition-colors">The Pirate Bay</span>
              </label>
            </div>
          </div>

          <!-- TPB filters -->
          <div id="tpbOptions" class="hidden space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div>
                <label class="block text-xs text-muted uppercase tracking-widest mb-2">Category</label>
                <select id="category" class="w-full px-3 py-2.5 bg-ink border border-border rounded-xl text-sm text-light focus:outline-none focus:border-accent transition-colors">
                  <option value="All">All</option>
                  <option value="Audio">Audio</option>
                  <option value="Video">Video</option>
                  <option value="Applications">Applications</option>
                  <option value="Games">Games</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-muted uppercase tracking-widest mb-2">Sort by</label>
                <select id="sortBy" class="w-full px-3 py-2.5 bg-ink border border-border rounded-xl text-sm text-light focus:outline-none focus:border-accent transition-colors">
                  <option value="">Default</option>
                  <option value="name">Name</option>
                  <option value="date">Date</option>
                  <option value="size">Size</option>
                  <option value="seeders">Seeders</option>
                  <option value="leechers">Leechers</option>
                </select>
              </div>
              <div>
                <label class="block text-xs text-muted uppercase tracking-widest mb-2">Order</label>
                <select id="order" class="w-full px-3 py-2.5 bg-ink border border-border rounded-xl text-sm text-light focus:outline-none focus:border-accent transition-colors">
                  <option value="desc">Descending</option>
                  <option value="asc">Ascending</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Search input -->
          <form id="searchForm">
            <div class="flex gap-3">
              <input
                id="query"
                type="text"
                placeholder="Search for a movie…"
                class="search-input flex-1 min-w-0 px-4 py-3 bg-ink border border-border rounded-xl text-sm text-light placeholder-muted transition-all duration-200"
              />
              <button
                type="submit"
                id="searchBtn"
                class="shrink-0 px-5 py-3 bg-accent text-ink rounded-xl text-sm font-medium font-body hover:bg-accent/90 active:scale-95 transition-all duration-150 flex items-center gap-2"
              >
                <span id="searchText">Search</span>
                <svg id="searchSpinner" class="hidden animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </button>
            </div>
          </form>
        </section>

        <!-- Results count -->
        <div id="resultsInfo" class="hidden animate-fade-up">
          <p id="resultCount" class="text-sm text-muted"></p>
        </div>

        <!-- Results grid -->
        <div id="results" class="grid gap-4 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 animate-fade-up"></div>

        <!-- No results -->
        <div id="noResults" class="hidden text-center py-20 animate-fade-up">
          <p class="text-4xl mb-4">🎭</p>
          <h3 class="text-xl mb-1">Nothing found</h3>
          <p class="text-sm text-muted">Try different keywords</p>
        </div>

        <!-- Error -->
        <div id="errorMessage" class="hidden text-center py-20 animate-fade-up">
          <p class="text-4xl mb-4">⚠️</p>
          <h3 class="text-xl mb-1 text-red-400">Something went wrong</h3>
          <p id="errorText" class="text-sm text-muted"></p>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="hidden flex justify-center items-center gap-3 pt-4">
          <button id="prevBtn" class="px-5 py-2.5 text-sm bg-panel border border-border rounded-xl hover:border-accent/50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            ← Prev
          </button>
          <div id="pageInfo" class="px-4 py-2.5 text-sm text-muted bg-panel border border-border rounded-xl"></div>
          <button id="nextBtn" class="px-5 py-2.5 text-sm bg-panel border border-border rounded-xl hover:border-accent/50 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
            Next →
          </button>
        </div>

      </main>

      <!-- Footer -->
      <footer class="border-t border-border mt-auto">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 text-center">
          <p class="text-xs text-muted">CineSearch — Movie Discovery</p>
        </div>
      </footer>

    </div>

    <style>
      /* Ensure dynamically created cards match the design */
      .glass-effect {
        background: #18181c;
        border: 1px solid #2a2a30;
      }
    </style>
    <script src="./app.js"></script>
    <script>
      // Patch: searchGlow no longer exists in the new HTML, override addInputEffects safely
      const _origInit = CineSearch.prototype.addInputEffects;
      CineSearch.prototype.addInputEffects = function() {
        // No-op: glow element removed in redesign
      };
    </script>
  </body>
</html>
